# render.yaml - Render Deployment Configuration
# Defines the web service and PostgreSQL database for LibraTrack
# Save at: LMS/render.yaml

services:
  - type: web
    name: libratrack
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: libratrack-db
          property: connectionString
      - key: DAILY_FINE_RATE
        value: "0.50"
      - key: BORROW_DURATION_DAYS
        value: "14"
      - key: ADMIN_EMAIL
        value: admin@library.com
      - key: ADMIN_PASSWORD
        value: Admin@123456
      - key: WTF_CSRF_ENABLED
        value: "True"

databases:
  - name: libratrack-db
    databaseName: libratrack
    user: libratrack_user
    region: oregon
    plan: free
